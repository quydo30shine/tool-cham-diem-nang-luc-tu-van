<title>Chấm điểm năng lực tư vấn — Salesup</title>
<style>
  :root{
    --bg:#F7F5F2; --panel:#FFFFFF; --panel-2:#FAF8F5;
    --ink:#1C1917; --ink-2:#57534E; --ink-3:#8A8175;
    --line:#E4DFD8; --line-2:#D6CFC5;
    --accent:#B45309; --accent-soft:#FDF0E2; --accent-ink:#7C3A05;
    --good:#15803D; --good-soft:#E7F3EA;
    --mid:#B45309; --mid-soft:#FBEEDD;
    --low:#B91C1C; --low-soft:#FBEAEA;
    --shadow:0 1px 2px rgba(28,25,23,.05), 0 8px 24px -12px rgba(28,25,23,.18);
    --r:10px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#14120F; --panel:#1D1A16; --panel-2:#232019;
      --ink:#F5F1EA; --ink-2:#B8B0A4; --ink-3:#8A8175;
      --line:#332E27; --line-2:#453E34;
      --accent:#F0A253; --accent-soft:#3A2913; --accent-ink:#F7C48C;
      --good:#5FBF7E; --good-soft:#1B2E21;
      --mid:#E4A056; --mid-soft:#33260F;
      --low:#EF7B7B; --low-soft:#38201F;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px -12px rgba(0,0,0,.6);
    }
  }
  :root[data-theme="dark"]{
    --bg:#14120F; --panel:#1D1A16; --panel-2:#232019;
    --ink:#F5F1EA; --ink-2:#B8B0A4; --ink-3:#8A8175;
    --line:#332E27; --line-2:#453E34;
    --accent:#F0A253; --accent-soft:#3A2913; --accent-ink:#F7C48C;
    --good:#5FBF7E; --good-soft:#1B2E21;
    --mid:#E4A056; --mid-soft:#33260F;
    --low:#EF7B7B; --low-soft:#38201F;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px -12px rgba(0,0,0,.6);
  }
  :root[data-theme="light"]{
    --bg:#F7F5F2; --panel:#FFFFFF; --panel-2:#FAF8F5;
    --ink:#1C1917; --ink-2:#57534E; --ink-3:#8A8175;
    --line:#E4DFD8; --line-2:#D6CFC5;
    --accent:#B45309; --accent-soft:#FDF0E2; --accent-ink:#7C3A05;
    --good:#15803D; --good-soft:#E7F3EA;
    --mid:#B45309; --mid-soft:#FBEEDD;
    --low:#B91C1C; --low-soft:#FBEAEA;
    --shadow:0 1px 2px rgba(28,25,23,.05), 0 8px 24px -12px rgba(28,25,23,.18);
  }

  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:15px; line-height:1.5; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:920px; margin:0 auto; padding:20px 16px 80px}

  /* ---- header ---- */
  header{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:18px}
  h1{font-size:19px; font-weight:650; letter-spacing:-.01em; margin:0}
  .sub{font-size:13px; color:var(--ink-3)}

  /* ---- select (người chấm + bộ lọc) ---- */
  select{
    font:inherit; font-size:13.5px; font-weight:550; color:var(--ink);
    background:var(--panel); border:1px solid var(--line-2); border-radius:7px;
    padding:7px 10px; cursor:pointer; max-width:220px;
  }
  select:hover{border-color:var(--ink-3)}
  select:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .me{margin-left:auto; display:flex; align-items:center; gap:8px}
  .me > span, .f > span{font-size:12px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-3); font-weight:650; white-space:nowrap}
  .me.warn select{border-color:var(--accent); background:var(--accent-soft)}
  .filters{display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:14px}
  .f{display:flex; align-items:center; gap:8px}
  .ghost.sm{padding:6px 11px; font-size:13px}

  /* ---- tabs ---- */
  .tabs{display:flex; gap:4px; background:var(--panel-2); border:1px solid var(--line);
        padding:4px; border-radius:var(--r); margin-bottom:20px}
  .tab{flex:1; border:0; background:transparent; color:var(--ink-2); cursor:pointer;
       font:inherit; font-weight:550; font-size:14px; padding:9px 12px; border-radius:7px;
       display:flex; align-items:center; justify-content:center; gap:7px}
  .tab:hover{color:var(--ink)}
  .tab[aria-selected="true"]{background:var(--panel); color:var(--ink); box-shadow:var(--shadow)}
  .tab .count{font-size:12px; font-variant-numeric:tabular-nums; background:var(--accent-soft);
              color:var(--accent-ink); padding:1px 7px; border-radius:20px; font-weight:650}

  /* ---- search ---- */
  .searchbox{position:relative}
  .searchbox input{
    width:100%; padding:14px 16px; font:inherit; font-size:16px; color:var(--ink);
    background:var(--panel); border:1px solid var(--line-2); border-radius:var(--r);
    box-shadow:var(--shadow); outline:none;
  }
  .searchbox input::placeholder{color:var(--ink-3)}
  .searchbox input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .results{
    position:absolute; z-index:20; top:calc(100% + 6px); left:0; right:0;
    background:var(--panel); border:1px solid var(--line-2); border-radius:var(--r);
    box-shadow:var(--shadow); max-height:340px; overflow-y:auto; padding:5px;
  }
  .results:empty{display:none}
  .hit{display:flex; align-items:center; gap:10px; width:100%; text-align:left;
       padding:9px 10px; border:0; background:transparent; border-radius:7px;
       cursor:pointer; font:inherit; color:var(--ink)}
  .hit:hover,.hit.on{background:var(--panel-2)}
  .hit .nm{font-weight:550; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .hit .id{font-variant-numeric:tabular-nums; font-size:13px; color:var(--ink-3)}
  .hit .meta{font-size:12.5px; color:var(--ink-2); white-space:nowrap}
  .empty{padding:14px; color:var(--ink-3); font-size:14px; text-align:center}

  /* ---- staff card ---- */
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
        box-shadow:var(--shadow); overflow:hidden}
  .who{display:flex; align-items:center; gap:14px; padding:16px 18px;
       border-bottom:1px solid var(--line); background:var(--panel-2)}
  .who .avatar{width:42px; height:42px; flex:none; border-radius:50%; display:grid; place-items:center;
       background:var(--accent-soft); color:var(--accent-ink); font-weight:650; font-size:15px}
  .who .txt{flex:1; min-width:0}
  .who .nm{font-weight:650; font-size:16px}
  .who .meta{font-size:13px; color:var(--ink-2); margin-top:1px}
  .who .meta b{font-weight:550; color:var(--ink); font-variant-numeric:tabular-nums}
  .linkbtn{border:1px solid var(--line-2); background:var(--panel); color:var(--ink-2);
       border-radius:7px; padding:6px 11px; font:inherit; font-size:13px; cursor:pointer}
  .linkbtn:hover{color:var(--ink); border-color:var(--ink-3)}

  .note{display:flex; gap:9px; padding:11px 18px; background:var(--accent-soft);
        color:var(--accent-ink); font-size:13px; border-bottom:1px solid var(--line)}

  /* ---- competency groups ---- */
  .grp{border-bottom:1px solid var(--line)}
  .grp:last-of-type{border-bottom:0}
  .grp-hd{display:flex; align-items:center; gap:10px; padding:13px 18px; background:var(--panel-2)}
  .grp-hd .t{flex:1; font-weight:600; font-size:14px}
  .grp-hd .w{font-size:12px; font-weight:650; color:var(--ink-2); font-variant-numeric:tabular-nums;
             border:1px solid var(--line-2); padding:2px 8px; border-radius:20px}
  .grp-hd .avg{font-size:13px; font-weight:650; font-variant-numeric:tabular-nums; color:var(--ink-3); min-width:52px; text-align:right}
  .grp-hd .avg.set{color:var(--accent)}

  .q{padding:14px 18px; display:flex; gap:16px; align-items:center; flex-wrap:wrap}
  .q + .q{border-top:1px dashed var(--line)}
  .q .txt{flex:1; min-width:220px; font-size:14px; color:var(--ink)}
  .q .txt .n{color:var(--ink-3); font-variant-numeric:tabular-nums; margin-right:6px; font-size:13px}

  .scale{display:flex; gap:5px; flex:none}
  .scale button{width:40px; height:38px; border:1px solid var(--line-2); background:var(--panel);
    border-radius:8px; font:inherit; font-weight:600; font-size:15px; color:var(--ink-2);
    cursor:pointer; font-variant-numeric:tabular-nums}
  .scale button:hover{border-color:var(--ink-3); color:var(--ink)}
  .scale button[aria-pressed="true"]{background:var(--accent); border-color:var(--accent); color:#fff}
  @media (prefers-color-scheme:dark){.scale button[aria-pressed="true"]{color:#14120F}}
  :root[data-theme="dark"] .scale button[aria-pressed="true"]{color:#14120F}
  :root[data-theme="light"] .scale button[aria-pressed="true"]{color:#fff}

  /* ---- footer bar ---- */
  .bar{position:sticky; bottom:0; margin-top:16px; display:flex; align-items:center; gap:14px;
       flex-wrap:wrap; background:var(--panel); border:1px solid var(--line-2);
       border-radius:var(--r); box-shadow:var(--shadow); padding:13px 16px}
  .total{display:flex; align-items:baseline; gap:8px; flex:1; min-width:180px}
  .total .lb{font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-3); font-weight:600}
  .total .v{font-size:26px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .total .of{font-size:14px; color:var(--ink-3); font-variant-numeric:tabular-nums}
  .pill{font-size:12px; font-weight:650; padding:3px 10px; border-radius:20px}
  .pill.good{background:var(--good-soft); color:var(--good)}
  .pill.mid{background:var(--mid-soft); color:var(--mid)}
  .pill.low{background:var(--low-soft); color:var(--low)}
  .pill.na{background:var(--panel-2); color:var(--ink-3)}
  .primary{border:0; background:var(--accent); color:#fff; font:inherit; font-weight:650; font-size:15px;
    padding:11px 20px; border-radius:8px; cursor:pointer}
  @media (prefers-color-scheme:dark){.primary{color:#14120F}}
  :root[data-theme="dark"] .primary{color:#14120F}
  :root[data-theme="light"] .primary{color:#fff}
  .primary:disabled{background:var(--line-2); color:var(--ink-3); cursor:not-allowed}
  .left{font-size:13px; color:var(--ink-3)}

  /* ---- done table ---- */
  .tablewrap{overflow-x:auto; background:var(--panel); border:1px solid var(--line);
             border-radius:var(--r); box-shadow:var(--shadow)}
  table{border-collapse:collapse; width:100%; font-size:14px}
  th{text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.06em;
     color:var(--ink-3); font-weight:650; padding:11px 14px; border-bottom:1px solid var(--line);
     background:var(--panel-2); white-space:nowrap}
  td{padding:11px 14px; border-bottom:1px solid var(--line); white-space:nowrap}
  tr:last-child td{border-bottom:0}
  td.num{font-variant-numeric:tabular-nums}
  td.nm{font-weight:550; white-space:normal}
  .del{border:0; background:transparent; color:var(--ink-3); cursor:pointer; font:inherit;
       font-size:13px; padding:3px 7px; border-radius:6px}
  .del:hover{background:var(--low-soft); color:var(--low)}
  .toolbar{display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap}
  .toolbar .grow{flex:1}
  .ghost{border:1px solid var(--line-2); background:var(--panel); color:var(--ink);
    font:inherit; font-size:14px; font-weight:550; padding:9px 14px; border-radius:8px; cursor:pointer}
  .ghost:hover{border-color:var(--ink-3)}
  .blank{padding:56px 20px; text-align:center; color:var(--ink-3)}
  .blank .big{font-size:15px; color:var(--ink-2); font-weight:550; margin-bottom:4px}

  /* ---- toast ---- */
  .toast{position:fixed; left:50%; bottom:26px; transform:translate(-50%,16px);
    background:var(--ink); color:var(--bg); padding:13px 18px; border-radius:10px;
    font-size:14.5px; font-weight:550; display:flex; gap:10px; align-items:center;
    box-shadow:0 12px 32px -8px rgba(0,0,0,.4); opacity:0; pointer-events:none;
    transition:opacity .22s ease, transform .22s ease; z-index:60; max-width:90vw}
  .toast.show{opacity:1; transform:translate(-50%,0)}
  .toast .tick{width:20px; height:20px; flex:none; border-radius:50%; background:var(--good);
    color:#fff; display:grid; place-items:center; font-size:12px; font-weight:700}
  @media (prefers-reduced-motion:reduce){.toast{transition:none}}

  .hide{display:none !important}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  @media (max-width:560px){
    .q{gap:10px}
    .scale button{width:100%; flex:1}
    .scale{width:100%}
    .q .txt{min-width:100%}
  }
</style>

<div class="wrap">
  <header>
    <h1>Chấm điểm năng lực tư vấn</h1>
    <span class="sub">Bộ câu hỏi Q2 &middot; Dữ liệu nhân sự tháng 7</span>
    <label class="me">
      <span>Người chấm</span>
      <select id="me" aria-label="Salesup đang chấm">
        <option value="">— Chọn tên bạn —</option>
      </select>
    </label>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" id="tab-score" aria-selected="true" aria-controls="p-score">Chấm điểm</button>
    <button class="tab" role="tab" id="tab-done" aria-selected="false" aria-controls="p-done">
      Đã chấm <span class="count" id="cnt">0</span>
    </button>
  </div>

  <!-- ================= TAB: CHẤM ĐIỂM ================= -->
  <section id="p-score" role="tabpanel" aria-labelledby="tab-score">
    <div class="searchbox" id="sb">
      <input id="q" type="text" autocomplete="off" spellcheck="false"
             placeholder="Nhập ID hoặc tên nhân sự…" aria-label="Tìm nhân sự">
      <div class="results" id="res" role="listbox"></div>
    </div>

    <div id="form" class="hide" style="margin-top:16px"></div>
  </section>

  <!-- ================= TAB: ĐÃ CHẤM ================= -->
  <section id="p-done" role="tabpanel" aria-labelledby="tab-done" class="hide">
    <div class="filters">
      <label class="f">
        <span>Salesup</span>
        <select id="f-sup"><option value="">Tất cả</option></select>
      </label>
      <label class="f">
        <span>Salon</span>
        <select id="f-salon"><option value="">Tất cả</option></select>
      </label>
      <button class="ghost sm hide" id="f-clear">Bỏ lọc</button>
    </div>
    <div class="toolbar">
      <span class="grow left" id="donesum">Chưa có nhân sự nào được chấm.</span>
      <button class="ghost" id="csv">Tải file CSV</button>
    </div>
    <div class="tablewrap" id="donewrap"></div>
  </section>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

  }
  const filled = sc.filter(v => v != null).length;
  const n = groups.reduce((a,g)=>a+g.q.length,0);
  const missing = groups.filter((g,gi) => gAvg[gi] == null).map(g => g.t);
  return { gAvg, on5: total, on100: total/5*100, filled, n, missing, complete: missing.length === 0 };
}
const band = p => p >= 80 ? "good" : p >= 60 ? "mid" : "low";
const bandTxt = p => p >= 80 ? "Đạt tốt" : p >= 60 ? "Đạt" : "Cần cải thiện";

function toast(msg){
  const t = $("toast");
  t.innerHTML = `<span class="tick">✓</span><span>${esc(msg)}</span>`;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 3600);
}

/* ---------- tabs ---------- */
function tab(which){
  const s = which === "score";
  $("tab-score").setAttribute("aria-selected", s);
  $("tab-done").setAttribute("aria-selected", !s);
  $("p-score").classList.toggle("hide", !s);
  $("p-done").classList.toggle("hide", s);
  if (!s) renderDone();
}
$("tab-score").onclick = () => tab("score");
$("tab-done").onclick  = () => tab("done");

/* ---------- search ---------- */
let hits = [], cur = -1;

function search(term){
  const t = norm(term.trim());
  if (!t) return [];
  const byId = /^\d+$/.test(t);
  const out = [];
  for (const s of STAFF){
    let rank = -1;
    if (byId){
      if (s.i === t) rank = 0;
      else if (s.i.startsWith(t)) rank = 1;
      else if (s.i.includes(t)) rank = 3;
    }
    const n = norm(s.n);
    if (rank < 0){
      if (n.startsWith(t)) rank = 1;
      else if (n.includes(t)) rank = 2;
      else if (norm(s.s).includes(t)) rank = 4;
    }
    if (rank >= 0) out.push([rank, s]);
  }
  out.sort((a,b) => a[0]-b[0] || a[1].n.localeCompare(b[1].n, "vi"));
  return out.slice(0, 12).map(x => x[1]);
}

function renderHits(){
  const box = $("res");
  if (!hits.length){
    box.innerHTML = $("q").value.trim()
      ? '<div class="empty">Không tìm thấy nhân sự nào khớp.</div>' : "";
    return;
  }
  box.innerHTML = hits.map((s,k) => `
    <button class="hit${k===cur?" on":""}" role="option" data-k="${k}">
      <span class="id">${esc(s.i)}</span>
      <span class="nm">${esc(s.n)}</span>
      <span class="meta">${esc(s.v)}${s.l?" · "+esc(s.l):""} · ${esc(s.s)}</span>
    </button>`).join("");
  box.querySelectorAll(".hit").forEach(b => b.onclick = () => pick(hits[+b.dataset.k]));
}

$("q").addEventListener("input", e => { hits = search(e.target.value); cur = -1; renderHits(); });
$("q").addEventListener("keydown", e => {
  if (!hits.length) return;
  if (e.key === "ArrowDown"){ e.preventDefault(); cur = (cur+1) % hits.length; renderHits(); }
  else if (e.key === "ArrowUp"){ e.preventDefault(); cur = (cur-1+hits.length) % hits.length; renderHits(); }
  else if (e.key === "Enter"){ e.preventDefault(); pick(hits[cur < 0 ? 0 : cur]); }
  else if (e.key === "Escape"){ hits = []; renderHits(); }
});
document.addEventListener("click", e => {
  if (!$("sb").contains(e.target)){ hits = []; renderHits(); }
});

/* ---------- chấm điểm ---------- */
function pick(s){
  if (!s) return;
  picked = s;
  scores = Array(formOf(s.v).reduce((a,g)=>a+g.q.length,0)).fill(null);
  hits = []; renderHits();
  $("q").value = "";
  renderForm();
  $("form").scrollIntoView({behavior:"smooth", block:"start"});
}

function renderForm(){
  const s = picked, groups = formOf(s.v);
  const prev = done.find(d => d.id === s.i);
  let i = 0;
  const groupsHtml = groups.map((g, gi) => {
    const qs = g.q.map(text => {
      const k = i++;
      return `<div class="q">
        <div class="txt"><span class="n">${k+1}.</span>${esc(text)}</div>
        <div class="scale" role="group" aria-label="Điểm câu ${k+1}">
          ${[1,2,3,4,5].map(v => `<button type="button" data-k="${k}" data-v="${v}"
             aria-pressed="false" title="${v} — ${esc(SCALE[v])}">${v}</button>`).join("")}
        </div></div>`;
    }).join("");
    return `<div class="grp">
      <div class="grp-hd">
        <span class="t">${esc(g.t)}</span>
        <span class="w">${g.w}%</span>
        <span class="avg" data-g="${gi}">—</span>
      </div>${qs}</div>`;
  }).join("");

  $("form").className = "";
  $("form").innerHTML = `
    <div class="card">
      <div class="who">
        <div class="avatar">${esc(initials(s.n))}</div>
        <div class="txt">
          <div class="nm">${esc(s.n)}</div>
          <div class="meta">ID <b>${esc(s.i)}</b> · ${esc(s.v)}${s.l?" · "+esc(s.l):""} · Salon ${esc(s.s)}</div>
        </div>
        <button class="linkbtn" id="clear">Đổi nhân sự</button>
      </div>
      ${prev ? `<div class="note">Nhân sự này đã được chấm lúc ${esc(fmtTime(prev.at))} — ${prev.on100.toFixed(1)}/100. Chấm lại sẽ ghi đè kết quả cũ.</div>` : ""}
      ${groupsHtml}
    </div>
    <div class="bar">
      <div class="total">
        <span class="lb">Điểm tổng</span>
        <span class="v" id="tv">—</span><span class="of">/100</span>
        <span class="pill na" id="tp">Chưa chấm</span>
      </div>
      <span class="left" id="tleft"></span>
      <button class="primary" id="submit" disabled>Hoàn tất chấm điểm</button>
    </div>`;

  $("clear").onclick = () => {
    picked = null; $("form").className = "hide"; $("form").innerHTML = "";
    $("q").focus();
  };
  $("form").querySelectorAll(".scale button").forEach(b => {
    b.onclick = () => {
      const k = +b.dataset.k, v = +b.dataset.v;
      scores[k] = scores[k] === v ? null : v;
      b.parentElement.querySelectorAll("button").forEach(x =>
        x.setAttribute("aria-pressed", +x.dataset.v === scores[k]));
      refresh();
    };
  });
  $("submit").onclick = submit;
  refresh();
}

function refresh(){
  const r = calc(picked.v, scores);
  $("form").querySelectorAll(".avg").forEach(el => {
    const a = r.gAvg[+el.dataset.g];
    el.textContent = a == null ? "—" : a.toFixed(1) + "/5";
    el.classList.toggle("set", a != null);
  });
  const tv = $("tv"), tp = $("tp");
  if (r.filled === 0){
    tv.textContent = "—";
    tp.className = "pill na"; tp.textContent = "Chưa chấm";
  } else {
    tv.textContent = r.on100.toFixed(1);
    tp.className = "pill " + band(r.on100);
    tp.textContent = bandTxt(r.on100);
  }
  if (!r.complete){
    $("tleft").textContent = `Cần chấm ít nhất 1 câu ở: ${r.missing.join(", ")}`;
  } else if (!me){
    $("tleft").textContent = "Chọn tên Salesup ở góc trên để hoàn tất.";
  } else {
    $("tleft").textContent = r.filled < r.n ? `Đã chấm ${r.filled}/${r.n} câu` : "";
  }
  $("submit").disabled = !r.complete || !me;
}

function submit(){
  const r = calc(picked.v, scores);
  if (!r.complete || !me) return;
  const rec = {
    id: picked.i, ten: picked.n, salon: picked.s, vitri: picked.v, level: picked.l,
    salesup: me,
    scores: scores.slice(), gAvg: r.gAvg, on5: r.on5, on100: r.on100,
    at: new Date().toISOString()
  };
  const k = done.findIndex(d => d.id === rec.id);
  const again = k >= 0;
  if (again) done[k] = rec; else done.unshift(rec);
  save();
  $("cnt").textContent = done.length;
  toast(`${again ? "Đã cập nhật" : "Hoàn tất"} chấm điểm ${picked.n} — ${r.on100.toFixed(1)}/100`);
  picked = null; scores = [];
  $("form").className = "hide"; $("form").innerHTML = "";
  $("q").focus();
}

/* ---------- danh sách đã chấm ---------- */
const shown = () => done.filter(d =>
  (!fSup   || (d.salesup || "") === fSup) &&
  (!fSalon || d.salon === fSalon));

function fillFilters(){
  const opts = (sel, vals, cur) => {
    sel.innerHTML = '<option value="">Tất cả</option>' +
      vals.map(v => `<option value="${esc(v)}"${v===cur?" selected":""}>${esc(v)}</option>`).join("");
  };
  const sups   = [...new Set(done.map(d => d.salesup).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"vi"));
  const salons = [...new Set(done.map(d => d.salon))].sort((a,b)=>a.localeCompare(b,"vi"));
  opts($("f-sup"), sups, fSup);
  opts($("f-salon"), salons, fSalon);
  $("f-clear").classList.toggle("hide", !fSup && !fSalon);
}

function renderDone(){
  $("cnt").textContent = done.length;
  fillFilters();
  const wrap = $("donewrap");

  if (!done.length){
    $("donesum").textContent = "Chưa có nhân sự nào được chấm.";
    wrap.innerHTML = `<div class="blank"><div class="big">Chưa có nhân sự nào được chấm</div>
      Sang tab <strong>Chấm điểm</strong>, tìm nhân sự theo ID hoặc tên để bắt đầu.</div>`;
    return;
  }

  const list = shown();
  if (!list.length){
    $("donesum").textContent = `0/${done.length} nhân sự khớp bộ lọc`;
    wrap.innerHTML = `<div class="blank"><div class="big">Không có nhân sự nào khớp bộ lọc</div>
      Bỏ lọc để xem lại toàn bộ ${done.length} nhân sự đã chấm.</div>`;
    return;
  }

  const avg = list.reduce((a,d)=>a+d.on100,0)/list.length;
  const filtered = fSup || fSalon;
  $("donesum").textContent =
    `${list.length}${filtered ? "/" + done.length : ""} nhân sự đã chấm · điểm trung bình ${avg.toFixed(1)}/100`;

  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Thời gian chấm</th><th>Salesup</th><th>ID</th><th>Tên nhân sự</th><th>Vị trí</th><th>Salon</th>
      <th>Điểm /100</th><th>Xếp loại</th><th></th>
    </tr></thead><tbody>
    ${list.map(d => `<tr>
      <td class="num">${esc(fmtTime(d.at))}</td>
      <td>${esc(d.salesup || "—")}</td>
      <td class="num">${esc(d.id)}</td>
      <td class="nm">${esc(d.ten)}</td>
      <td>${esc(d.vitri)}</td>
      <td>${esc(d.salon)}</td>
      <td class="num"><strong>${d.on100.toFixed(1)}</strong></td>
      <td><span class="pill ${band(d.on100)}">${bandTxt(d.on100)}</span></td>
      <td><button class="del" data-id="${esc(d.id)}" title="Xoá bản ghi">Xoá</button></td>
    </tr>`).join("")}
    </tbody></table>`;

  wrap.querySelectorAll(".del").forEach(b => b.onclick = () => {
    const k = done.findIndex(d => d.id === b.dataset.id);
    if (k < 0) return;
    if (!confirm(`Xoá kết quả chấm của ${done[k].ten} (ID ${done[k].id})?`)) return;
    done.splice(k, 1); save(); renderDone();
  });
}

$("f-sup").onchange   = e => { fSup = e.target.value; renderDone(); };
$("f-salon").onchange = e => { fSalon = e.target.value; renderDone(); };
$("f-clear").onclick  = () => { fSup = ""; fSalon = ""; renderDone(); };

/* ---------- xuất CSV ---------- */
$("csv").onclick = () => {
  const list = shown();
  if (!list.length){ toast("Chưa có dữ liệu để tải."); return; }
  const maxQ = Math.max(...list.map(d => d.scores.length));
  const head = ["Thoi gian cham","Salesup","ID","Ten nhan su","Vi tri","Level","Salon",
    "NL1 Nhan dien nhu cau (/5)","NL2 Tu van giai phap (/5)","NL3 Xay bill (/5)","NL4 Chot sale (/5)",
    "Diem tong (/5)","Diem tong (/100)","Xep loai",
    ...Array.from({length:maxQ}, (_,k) => `Cau ${k+1}`)];
  const cell = v => {
    const s = v == null ? "" : String(v);
    return /[",\n;]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  };
  const rows = list.map(d => [
    fmtTime(d.at), d.salesup || "", d.id, d.ten, d.vitri, d.level, d.salon,
    ...d.gAvg.map(a => a == null ? "" : a.toFixed(2)),
    d.on5.toFixed(2), d.on100.toFixed(1), bandTxt(d.on100),
    ...Array.from({length:maxQ}, (_,k) => d.scores[k] ?? "")
  ].map(cell).join(","));
  const blob = new Blob(["﻿" + [head.map(cell).join(","), ...rows].join("\r\n")],
    {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `cham-diem-nang-luc-tu-van_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`Đã tải file CSV — ${list.length} nhân sự.`);
};

/* ---------- người chấm ---------- */
function paintMe(){
  document.querySelector(".me").classList.toggle("warn", !me);
}
$("me").innerHTML = '<option value="">— Chọn tên bạn —</option>' +
  SALESUP.map(s => `<option value="${esc(s)}"${s===me?" selected":""}>${esc(s)}</option>`).join("");
$("me").onchange = e => {
  me = e.target.value;
  try { localStorage.setItem(ME_KEY, me); } catch(err){}
  paintMe();
  if (picked) refresh();
};

/* ---------- init ---------- */
paintMe();
$("cnt").textContent = done.length;
$("q").focus();
</script>
